<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#061522"/>
      <stop offset="0.58" stop-color="#101827"/>
      <stop offset="1" stop-color="#082f2c"/>
    </linearGradient>
  </defs>
  <style>
    .eyebrow { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #67e8f9; letter-spacing: 3px; }
    .title { font: 900 36px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
    .section { font: 800 22px 'Segoe UI', Arial, sans-serif; fill: #67e8f9; }
    .body { font: 500 23px 'Segoe UI', Arial, sans-serif; fill: #dbeafe; }
    .code { font: 700 24px Consolas, 'Courier New', monospace; fill: #f8fafc; }
    .hint { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #a7b4c8; }
    .codeBox { fill: rgba(15, 23, 42, 0.88); stroke: rgba(103, 232, 249, 0.34); stroke-width: 2; }
    .resultBox { fill: rgba(10, 34, 43, 0.78); stroke: rgba(52, 211, 153, 0.32); stroke-width: 2; }
  </style>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="1160" cy="80" r="160" fill="#164e63" opacity="0.16"/>
  <circle cx="170" cy="690" r="210" fill="#14b8a6" opacity="0.10"/>
  <text x="48" y="60" class="eyebrow">SceneMax Language Fundamentals</text>
  <text x="48" y="102" class="title">Object Arrays</text>
  <rect x="48" y="132" width="560" height="432" rx="8" class="codeBox"/>
  <text x="76" y="176" class="section">Sample code</text>
  <text x="76" y="218" class="code">s1 =&gt; sinbad</text>
  <text x="76" y="248" class="code">s2 =&gt; ninja</text>
  <text x="76" y="278" class="code">s3 =&gt; bird sprite</text>
  <text x="76" y="308" class="code">b =&gt; box</text>
  <text x="76" y="338" class="code"> </text>
  <text x="76" y="368" class="code">var my_objects = [s1,s2,s3,b]</text>
  <text x="76" y="398" class="code">var random_obj = my_objects[rnd(4)]</text>
  <text x="76" y="428" class="code">random_obj.turn left 360 in 10 seconds</text>
  <rect x="662" y="132" width="560" height="432" rx="8" class="resultBox"/>
  <text x="694" y="176" class="section">Game use</text>
  <text x="694" y="218" class="body">A power-up should affect one existing</text>
  <text x="694" y="248" class="body">object chosen from the scene.</text>
  <text x="694" y="302" class="section">What the code does</text>
  <text x="694" y="344" class="body">The array stores object references, not</text>
  <text x="694" y="374" class="body">text. The chosen object can immediately</text>
  <text x="694" y="404" class="body">turn, move, hide, or receive gameplay</text>
  <text x="694" y="434" class="body">changes.</text>
  <text x="48" y="626" class="hint">The left side is the lesson code. The right side explains the runtime meaning in a real game.</text>
</svg>